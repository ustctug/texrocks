package = "demo-markdown"
version = "0.3.12"
lua = ">=5.1"

[description]
summary = "Example for markdown"
maintainer = "Wu"
labels = ["texmf"]
homepage = "https://texrocks.readthedocs.io/en/latest/topics/demo-markdown.md.html"
license = "GPL-3.0"

[build_dependencies]
lualatex = ">=0.3.12"
markdown2tex = ">=3.11.4"
babel-base = ">=25.12"

[test_dependencies]
lua-open = ">=0.3.6"

[test]
type = "command"
command = "lua-open"
flags = ["main.pdf"]

[build]
type = "command"
build_command = "lualatex --interaction=nonstopmode main.tex"

[build.install.conf]
'../doc/main.pdf' = 'main.pdf'
