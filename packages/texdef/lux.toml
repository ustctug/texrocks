package = "texdef"
version = "0.3.12"
lua = ">=5.1"

[description]
summary = "Show definitions of TeX commands"
detailed = "A reimplementation of https://github.com/MartinScharrer/texdef/ by texlua"
maintainer = "Wu"
labels = [ "texmf" ]
homepage = "https://texrocks.readthedocs.io/en/latest/topics/texdef.md.html"
license = 'GPL-3.0'

[source]
url = "https://github.com/ustctug/texrocks/archive/$(VERSION).zip"
dir = "texrocks-$(VERSION)/packages/$(PACKAGE)"

[dependencies]
argparse = ">=0.7.1"
lua-template = ">=1.0.0"
currfile = ">=1.0"
lualatex = ">=0.3.12"
luatex = ">=0.3.12"

[test_dependencies]
l3build = "2024.10.16-1"
toml2lua = ">=3.0.0"

[run]
type = "command"
command = "latexdef"

[test]
type = "command"
command = "texdef"
flags = ["TeX"]

[build]
type = "builtin"
