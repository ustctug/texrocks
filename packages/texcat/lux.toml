package = "texcat"
version = "0.3.13"
lua = ">=5.1"

[description]
summary = "syntax highlight code in LaTeX"
detailed = "A reimplementation of https://pygments.org/docs/formatters/#LatexFormatter by texlua"
maintainer = "Wu"
labels = [ "tex" ]
homepage = "https://texrocks.readthedocs.io/en/latest/topics/texcat.md.html"
license = 'GPL-3.0'

[source]
url = "https://github.com/ustctug/texrocks/archive/$(VERSION).zip"
dir = "texrocks-$(VERSION)/packages/$(PACKAGE)"

[dependencies]
vim = ">=0.0.4"
argparse = ">=0.7.1"
lua-template = ">=1.0.0"
warna = ">=0.3.5"
ltreesitter = ">=0.1.0"
nvim-textmate = ">=0.0.1"
luafilesystem = ">=1.9.0"
texrocks = ">=0.3.13"
vscode-extensions = ">=1.102.3"

[test_dependencies]
fancyvrb = ">=4.6"
lualatex = ">=0.3.12"
graphics-cfg = ">=0.0.1"
l3build = "2024.10.16-1"
toml2lua = ">=3.0.0"
tree-sitter-lua = ">=0.0.36"
tree-sitter-latex = ">=0.0.38"

[run]
type = "command"
command = "texcat"

[test]
type = "command"
command = "lualatex"
flags = ["--shell-escape", "test.tex"]

[build]
type = "builtin"
